name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"
    - cron: "45 * * * *"

# Set global permissions to least privilege
permissions: read-all

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-token:
    runs-on: ubuntu-latest

    environment:
      name: databricks-dashboard

    steps:
      - name: Generate Databricks scoped token
        shell: bash
        env:
          INSTANCE_URL: ${{ vars.DATABRICKS_INSTANCE_URL }}
          DASHBOARD_ID: ${{ vars.DATABRICKS_DASHBOARD_ID }}
          SERVICE_PRINCIPAL_ID: ${{ vars.DATABRICKS_SERVICE_PRINCIPAL_ID }}
          SERVICE_PRINCIPAL_SECRET: ${{ secrets.DATABRICKS_SERVICE_PRINCIPAL_SECRET }}
          EXTERNAL_VIEWER_ID: ${{ vars.DATABRICKS_EXTERNAL_VIEWER_ID }}
        run: |
          set -euo pipefail

          INSTANCE_URL="${INSTANCE_URL%/}"

          echo "Requesting Databricks all-apis token..."
          oidc_response="$(
            curl -sS \
              -X POST "${INSTANCE_URL}/oidc/v1/token" \
              -u "${SERVICE_PRINCIPAL_ID}:${SERVICE_PRINCIPAL_SECRET}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "scope=all-apis"
          )"

          oidc_token="$(echo "$oidc_response" | jq -r '.access_token')"

          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "Failed to get Databricks all-apis token"
            echo "$oidc_response"
            exit 1
          fi

          echo "Requesting dashboard tokeninfo..."
          tokeninfo="$(
            curl -sS -G \
              "${INSTANCE_URL}/api/2.0/lakeview/dashboards/${DASHBOARD_ID}/published/tokeninfo" \
              -H "Authorization: Bearer ${oidc_token}" \
              --data-urlencode "external_viewer_id=${EXTERNAL_VIEWER_ID}"
          )"

          authorization_details="$(echo "$tokeninfo" | jq -c '.authorization_details')"

          if [ -z "$authorization_details" ] || [ "$authorization_details" = "null" ]; then
            echo "Failed to get tokeninfo authorization_details"
            echo "$tokeninfo"
            exit 1
          fi

          scope="$(echo "$tokeninfo" | jq -r '.scope // empty')"
          custom_claim="$(echo "$tokeninfo" | jq -r '.custom_claim // empty')"

          echo "Requesting scoped token..."
          scoped_response="$(
            curl -sS \
              -X POST "${INSTANCE_URL}/oidc/v1/token" \
              -u "${SERVICE_PRINCIPAL_ID}:${SERVICE_PRINCIPAL_SECRET}" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "scope=${scope}" \
              --data-urlencode "authorization_details=${authorization_details}" \
              --data-urlencode "custom_claim=${custom_claim}"
          )"

          scoped_token="$(echo "$scoped_response" | jq -r '.access_token')"

          if [ -z "$scoped_token" ] || [ "$scoped_token" = "null" ]; then
            echo "Failed to get scoped token"
            echo "$scoped_response"
            exit 1
          fi

          printf '%s' "$scoped_token" > token.txt

      - name: Upload token artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: databricks-token
          path: token.txt
          retention-days: 1

  build-site:
    runs-on: ubuntu-latest
    needs: generate-token

    steps:
      - uses: actions/checkout@v6.0.2
        with:
            persist-credentials: false 

      - name: Download token artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: databricks-token

      - name: Inject token into HTML
        shell: bash
        env:
          INSTANCE_URL: ${{ vars.DATABRICKS_INSTANCE_URL }}
          WORKSPACE_ID: ${{ vars.DATABRICKS_WORKSPACE_ID }}
          DASHBOARD_ID: ${{ vars.DATABRICKS_DASHBOARD_ID }}
        run: |
          set -euo pipefail

          TOKEN="$(cat token.txt)"

          escape() { printf '%s' "$1" | sed 's/[\/&]/\\&/g'; }

          sed -i.bak \
            -e "s/__DATABRICKS_INSTANCE_URL__/$(escape "$INSTANCE_URL")/g" \
            -e "s/__DATABRICKS_WORKSPACE_ID__/$(escape "$WORKSPACE_ID")/g" \
            -e "s/__DATABRICKS_DASHBOARD_ID__/$(escape "$DASHBOARD_ID")/g" \
            -e "s/__DATABRICKS_TOKEN__/$(escape "$TOKEN")/g" \
            index.html

          rm -f index.html.bak

      - uses: actions/configure-pages@v6.0.0

      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: "."

  publish-site:
    runs-on: ubuntu-latest
    needs: build-site

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
